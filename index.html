<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NatureZone - Investment Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f23; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { width: 100%; max-width: 480px; padding: 20px; }
    .card { background: #1a1a3e; border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    h1 { text-align: center; color: #2d7d46; font-size: 28px; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
    input { width: 100%; padding: 12px 16px; margin: 8px 0; border: 1px solid #333; border-radius: 8px; background: #0f0f23; color: #fff; font-size: 15px; }
    input:focus { outline: none; border-color: #2d7d46; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-primary { background: #2d7d46; color: #fff; }
    .btn-primary:hover { background: #359f55; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #e74c3c; }
    .btn-secondary { background: #2980b9; color: #fff; }
    .btn-small { padding: 8px 16px; font-size: 13px; width: auto; }
    .link { color: #2d7d46; cursor: pointer; text-decoration: underline; font-size: 14px; }
    .link:hover { color: #359f55; }
    .error { color: #ff6b6b; font-size: 14px; margin: 8px 0; text-align: center; }
    .success { color: #2ecc71; font-size: 14px; margin: 8px 0; text-align: center; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
    .stat-box { background: #0f0f23; border-radius: 10px; padding: 15px; text-align: center; }
    .stat-box .label { font-size: 12px; color: #888; }
    .stat-box .value { font-size: 20px; font-weight: 700; color: #2d7d46; margin-top: 4px; }
    hr { border: none; border-top: 1px solid #2a2a4a; margin: 20px 0; }
    .balance-big { font-size: 32px; font-weight: 700; color: #2d7d46; text-align: center; margin: 10px 0; }
    .admin-link { text-align: center; margin-top: 20px; font-size: 12px; color: #555; }
    .admin-link a { color: #555; text-decoration: none; }
    .admin-link a:hover { color: #888; }
    .tx-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
    .tx-table th { text-align: left; color: #888; padding: 8px 4px; border-bottom: 1px solid #333; }
    .tx-table td { padding: 8px 4px; border-bottom: 1px solid #222; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .badge-completed { background: #27ae60; color: #fff; }
    .badge-pending { background: #f39c12; color: #fff; }
    .badge-failed { background: #e74c3c; color: #fff; }
    .hidden { display: none; }
    .tab-bar { display: flex; gap: 4px; margin: 15px 0; }
    .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; background: #0f0f23; color: #888; font-size: 13px; transition: 0.2s; }
    .tab.active { background: #2d7d46; color: #fff; }
    .tab:hover { background: #2a2a4a; }
    #loading { text-align: center; padding: 40px 0; color: #888; }
    .spinner { border: 3px solid #2a2a4a; border-top: 3px solid #2d7d46; border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .deposit-amounts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; }
    .deposit-amounts button { padding: 12px; border: 1px solid #333; border-radius: 8px; background: #0f0f23; color: #fff; cursor: pointer; font-size: 14px; }
    .deposit-amounts button:hover { border-color: #2d7d46; }
    .withdraw-section { margin: 10px 0; }
    .withdraw-section label { display: block; margin: 10px 0 5px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>
<div class="container">
  <div id="app"></div>
</div>

<script>
// ====================================================================
// NATUREZONE - SINGLE FILE FRONTEND
// Zero admin code. Zero API keys. Zero secrets.
// All API calls go to the backend server.
// ====================================================================

// ── CHANGE THIS TO YOUR BACKEND URL ────────────────────────────────
const API_URL = 'https://naturezone-admin.onrender.com/api';
// ───────────────────────────────────────────────────────────────────

const state = {
  token: localStorage.getItem('nz_token') || '',
  user: null,
  transactions: [],
  loading: true,
  error: '',
  success: '',
  authMode: 'login', // login | register
  activeTab: 'dashboard' // dashboard | deposit | withdraw | history
};

// ── API HELPER ────────────────────────────────────────────────────

async function apiCall(endpoint, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (state.token) opts.headers['Authorization'] = `Bearer ${state.token}`;
  if (body) opts.body = JSON.stringify(body);
  
  try {
    const res = await fetch(`${API_URL}${endpoint}`, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  } catch (err) {
    throw err;
  }
}

// ── AUTH ──────────────────────────────────────────────────────────

async function handleAuth(e) {
  e.preventDefault();
  state.error = '';
  state.success = '';
  const form = e.target;
  const email = form.email.value;
  const password = form.password.value;
  
  try {
    const endpoint = state.authMode === 'register' ? '/auth/register' : '/auth/login';
    const data = await apiCall(endpoint, 'POST', { email, password });
    state.token = data.token;
    localStorage.setItem('nz_token', data.token);
    state.user = data.user;
    render();
    loadDashboard();
  } catch (err) {
    state.error = err.message;
    render();
  }
}

function handleLogout() {
  state.token = '';
  state.user = null;
  localStorage.removeItem('nz_token');
  render();
}

// ── DASHBOARD ─────────────────────────────────────────────────────

async function loadDashboard() {
  state.loading = true;
  render();
  try {
    const [profile, txs] = await Promise.all([
      apiCall('/user/profile'),
      apiCall('/user/transactions')
    ]);
    state.user = profile;
    state.transactions = txs;
    state.loading = false;
    render();
  } catch (err) {
    if (err.message.includes('401') || err.message.includes('Not authenticated')) {
      state.token = '';
      localStorage.removeItem('nz_token');
      state.user = null;
    }
    state.loading = false;
    state.error = err.message;
    render();
  }
}

// ── DEPOSIT ───────────────────────────────────────────────────────

async function handleDeposit(amount) {
  state.error = '';
  state.success = '';
  render();
  try {
    const data = await apiCall('/deposit', 'POST', { amount });
    if (data.checkoutUrl) {
      window.location.href = data.checkoutUrl;
    }
  } catch (err) {
    state.error = err.message;
    render();
  }
}

// ── RENDER ────────────────────────────────────────────────────────

function render() {
  const app = document.getElementById('app');
  
  // ── AUTH SCREEN ──
  if (!state.token) {
    app.innerHTML = `
      <div class="card">
        <h1>🌿 NATURE ZONE</h1>
        <p class="subtitle">Investment Platform</p>
        <hr />
        <h2 style="margin-bottom:15px;font-size:20px;">${state.authMode === 'register' ? 'Create Account' : 'Welcome back'}</h2>
        ${state.error ? `<div class="error">${state.error}</div>` : ''}
        ${state.success ? `<div class="success">${state.success}</div>` : ''}
        <form onsubmit="handleAuth(event)">
          <input type="email" name="email" placeholder="Email address" required autocomplete="email" />
          <input type="password" name="password" placeholder="Password" minlength="6" required autocomplete="${state.authMode === 'register' ? 'new-password' : 'current-password'}" />
          <button type="submit" class="btn btn-primary" style="margin-top:12px;">${state.authMode === 'register' ? 'Register' : 'Sign In'}</button>
        </form>
        <p style="margin-top:16px;text-align:center;">
          <span class="link" onclick="state.authMode = state.authMode === 'register' ? 'login' : 'register'; state.error=''; state.success=''; render();">
            ${state.authMode === 'register' ? 'Already have an account? Sign in.' : "Don't have an account? Register."}
          </span>
        </p>
        <p style="margin-top:12px;text-align:center;font-size:13px;color:#555;">
          <span class="link" onclick="state.authMode='forgot';state.error='';state.success='';render();">Forgot password?</span>
        </p>
      </div>
    `;
    return;
  }
  
  // ── FORGOT PASSWORD SCREEN ──
  if (state.authMode === 'forgot') {
    app.innerHTML = `
      <div class="card">
        <h1>🌿 NATURE ZONE</h1>
        <p class="subtitle">Reset Password</p>
        <hr />
        <p style="text-align:center;color:#888;margin:10px 0;">Contact the admin to reset your password.</p>
        <p style="text-align:center;font-size:13px;color:#555;">Email admin@naturezone.com or visit the <a href="https://naturezone-admin.onrender.com/admin" style="color:#2d7d46;">admin dashboard</a>.</p>
        <p style="text-align:center;margin-top:15px;"><span class="link" onclick="state.authMode='login';state.error='';state.success='';render();">Back to Sign In</span></p>
      </div>
    `;
    return;
  }
  
  // ── LOADING ──
  if (state.loading) {
    app.innerHTML = `
      <div class="card">
        <div id="loading">
          <div class="spinner"></div>
          <p>Loading your dashboard...</p>
        </div>
      </div>
    `;
    return;
  }
  
  // ── DASHBOARD ──
  const user = state.user || { email: '', balance: 0, invested: 0, asset: 'Metallic Minerals', interest: 2.0 };
  
  app.innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <h1 style="font-size:22px;margin:0;">🌿 NATURE ZONE</h1>
        <span style="font-size:12px;color:#888;">${user.email}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <span style="font-size:13px;color:#2d7d46;">● Active</span>
        <button class="btn btn-small btn-danger" onclick="handleLogout()" style="padding:4px 12px;font-size:12px;">Sign Out</button>
      </div>
      <hr />
      
      <div class="balance-big">₦${Number(user.balance || 0).toLocaleString()}</div>
      <p style="text-align:center;color:#888;font-size:13px;">Available Balance (NGN)</p>
      
      <div class="stat-grid">
        <div class="stat-box"><div class="label">Invested</div><div class="value">₦${Number(user.invested || 0).toLocaleString()}</div></div>
        <div class="stat-box"><div class="label">Asset</div><div class="value" style="font-size:14px;">${user.asset || 'Metallic Minerals'}</div></div>
        <div class="stat-box"><div class="label">Daily Interest</div><div class="value">${user.interest || 2.0}%</div></div>
        <div class="stat-box"><div class="label">Status</div><div class="value" style="font-size:14px;color:#27ae60;">Active</div></div>
      </div>
      
      ${state.error ? `<div class="error">${state.error}</div>` : ''}
      ${state.success ? `<div class="success">${state.success}</div>` : ''}
      
      <hr />
      
      <div class="tab-bar">
        <div class="tab ${state.activeTab === 'dashboard' ? 'active' : ''}" onclick="state.activeTab='dashboard';state.error='';state.success='';render();">📊 Dashboard</div>
        <div class="tab ${state.activeTab === 'deposit' ? 'active' : ''}" onclick="state.activeTab='deposit';state.error='';state.success='';render();">💰 Deposit</div>
        <div class="tab ${state.activeTab === 'withdraw' ? 'active' : ''}" onclick="state.activeTab='withdraw';state.error='';state.success='';render();">💸 Withdraw</div>
        <div class="tab ${state.activeTab === 'history' ? 'active' : ''}" onclick="state.activeTab='history';state.error='';state.success='';render();">📜 History</div>
      </div>
      
      ${renderTabContent(user)}
      
      <hr />
      <div class="admin-link">
        <a href="https://naturezone-admin.onrender.com/admin" target="_blank">🔐 Admin Dashboard (secured access)</a>
      </div>
    </div>
  `;
}

function renderTabContent(user) {
  const tx = state.transactions || [];
  
  switch (state.activeTab) {
    case 'dashboard':
      return `
        <div style="text-align:center;padding:10px 0;">
          <p style="color:#888;font-size:14px;">Current Investment Asset</p>
          <p style="font-size:18px;font-weight:600;">⛏️ ${user.asset || 'Metallic Minerals'}</p>
          <p style="font-size:13px;color:#2d7d46;">Interest: ${user.interest || 2.0}% daily</p>
        </div>
        <div style="display:flex;gap:10px;margin-top:10px;">
          <button class="btn btn-primary" onclick="state.activeTab='deposit';state.error='';state.success='';render();" style="flex:1;">💰 Deposit</button>
          <button class="btn btn-secondary" onclick="state.activeTab='withdraw';state.error='';state.success='';render();" style="flex:1;">💸 Withdraw</button>
        </div>
        <div style="margin-top:15px;">
          <p style="font-size:13px;font-weight:600;margin-bottom:8px;">Recent Transactions</p>
          ${tx.length === 0 ? '<p style="color:#555;font-size:13px;">No transactions yet.</p>' : `
          <table class="tx-table">
            <tr><th>Type</th><th>Amount</th><th>Status</th></tr>
            ${tx.slice(0, 5).map(t => `
              <tr>
                <td>${t.type || t.details || '-'}</td>
                <td>₦${Number(t.amount || 0).toLocaleString()}</td>
                <td><span class="badge badge-${(t.status || 'pending').toLowerCase()}">${t.status || 'Pending'}</span></td>
              </tr>
            `).join('')}
          </table>`}
        </div>
      `;
      
    case 'deposit':
      return `
        <div style="text-align:center;padding:10px 0;">
          <p style="color:#888;font-size:14px;">Fund via Monnify (Bank Transfer / Card / USSD)</p>
        </div>
        <div class="deposit-amounts">
          <button onclick="handleDeposit(1000)">₦1,000</button>
          <button onclick="handleDeposit(5000)">₦5,000</button>
          <button onclick="handleDeposit(10000)">₦10,000</button>
          <button onclick="handleDeposit(25000)">₦25,000</button>
          <button onclick="handleDeposit(50000)">₦50,000</button>
          <button onclick="handleDeposit(100000)">₦100,000</button>
        </div>
        <div style="margin-top:15px;display:flex;gap:10px;">
          <input type="number" id="custom-deposit" placeholder="Custom amount (NGN)" min="1000" style="flex:1;" />
          <button class="btn btn-primary btn-small" onclick="const amt=document.getElementById('custom-deposit').value;if(amt>=1000)handleDeposit(amt);else state.error='Minimum deposit: ₦1,000';render();" style="width:auto;">Deposit</button>
        </div>
        <p style="color:#555;font-size:12px;margin-top:8px;">Minimum deposit: ₦1,000. You'll be redirected to Monnify to complete payment.</p>
      `;
      
    case 'withdraw':
      return `
        <div style="text-align:center;padding:10px 0;">
          <p style="color:#888;font-size:14px;">Available: <strong style="color:#2d7d46;">₦${Number(user.balance || 0).toLocaleString()}</strong></p>
        </div>
        <div class="withdraw-section">
          <label>Amount (NGN)</label>
          <input type="number" id="withdraw-amount" placeholder="Enter amount" min="500" max="${user.balance || 0}" />
          <label>Bank Account Number</label>
          <input type="text" id="withdraw-account" placeholder="Account number" />
          <label>Bank Name</label>
          <input type="text" id="withdraw-bank" placeholder="e.g. GTBank, Access Bank" />
          <label>Account Name</label>
          <input type="text" id="withdraw-name" placeholder="Full name on account" />
          <button class="btn btn-primary" style="margin-top:12px;" onclick="submitWithdraw()">💸 Submit Withdrawal Request</button>
          <p style="color:#555;font-size:12px;margin-top:8px;">Withdrawals are processed on ${user.withdrawalDay || 'Friday'} after admin approval.</p>
        </div>
      `;
      
    case 'history':
      return `
        <div style="padding:10px 0;">
          <p style="font-size:13px;font-weight:600;margin-bottom:10px;">Transaction History</p>
          ${tx.length === 0 ? '<p style="color:#555;font-size:13px;text-align:center;padding:20px 0;">No transactions yet.</p>' : `
          <table class="tx-table">
            <tr><th>Date</th><th>Type</th><th>Amount</th><th>Status</th><th>Details</th></tr>
            ${tx.map(t => `
              <tr>
                <td style="font-size:11px;">${t.date ? new Date(t.date).toLocaleDateString() : '-'}</td>
                <td>${t.type || 'Transaction'}</td>
                <td>₦${Number(t.amount || 0).toLocaleString()}</td>
                <td><span class="badge badge-${(t.status || 'pending').toLowerCase()}">${t.status || 'Pending'}</span></td>
                <td style="font-size:11px;color:#888;">${t.details || '-'}</td>
              </tr>
            `).join('')}
          </table>`}
        </div>
      `;
      
    default:
      return '<p>Select a tab above.</p>';
  }
}

async function submitWithdraw() {
  const amount = document.getElementById('withdraw-amount').value;
  const account = document.getElementById('withdraw-account').value;
  const bank = document.getElementById('withdraw-bank').value;
  const name = document.getElementById('withdraw-name').value;
  
  if (!amount || amount < 500) { state.error = 'Minimum withdrawal: ₦500'; render(); return; }
  if (!account || account.length < 10) { state.error = 'Enter a valid account number'; render(); return; }
  if (!bank) { state.error = 'Enter your bank name'; render(); return; }
  if (!name) { state.error = 'Enter the account holder name'; render(); return; }
  if (amount > (state.user?.balance || 0)) { state.error = 'Insufficient balance'; render(); return; }
  
  try {
    const data = await apiCall('/withdraw', 'POST', { amount, accountNumber: account, bankName: bank, accountName: name });
    state.success = 'Withdrawal request submitted! Pending admin approval.';
    state.error = '';
    loadDashboard();
  } catch (err) {
    state.error = err.message;
    render();
  }
}

// ── INIT ──────────────────────────────────────────────────────────

if (state.token) {
  loadDashboard();
} else {
  state.loading = false;
  render();
}
</script>
</body>
</html>
